# Staged pipeline: fast quality gates and the integration/build job run on
# every push and PR; the Playwright critical subset gates PRs; the full E2E +
# axe matrix runs on main, nightly, and on demand. Local functionality never
# depends on CI — everything here is `pnpm <script>` a developer can run.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *" # nightly full E2E run
  workflow_dispatch:

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Format, lint, types, unit + component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma Client is generated code. pnpm's side-effects cache (persisted
      # via the pnpm store cache) skips @prisma/client's postinstall on warm
      # runs, and the generated client lives outside the package directory, so
      # it must be generated explicitly before typechecking, tests, or builds.
      - run: pnpm db:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  integration-build:
    name: Integration tests + production build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: shopops
          POSTGRES_PASSWORD: shopops_local_dev
          POSTGRES_DB: shopops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shopops -d shopops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Explicitly match the integration suite's isolated test DB and origin;
      # .env.test contains the same obviously-local values.
      DATABASE_URL: postgresql://shopops:shopops_local_dev@localhost:5432/shopops_test
      APP_URL: http://localhost:3100
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      # Service-layer + route-handler tests against real Postgres (the global
      # setup applies migrations and refuses non-shopops_test databases).
      - run: pnpm test:integration
      # The production image performs `next build` in its builder stage, so this
      # continuously verifies the exact artifact that would be deployed.
      - run: docker build --tag shopops-local:ci .

  e2e-critical:
    name: Playwright @critical subset
    needs: [quality, integration-build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: shopops
          POSTGRES_PASSWORD: shopops_local_dev
          POSTGRES_DB: shopops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shopops -d shopops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://shopops:shopops_local_dev@localhost:5432/shopops_test
      APP_URL: http://localhost:3100
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:critical
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-critical
          path: playwright-report/
          retention-days: 14

  e2e-full:
    name: Full Playwright suite + axe scans
    needs: [quality, integration-build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: shopops
          POSTGRES_PASSWORD: shopops_local_dev
          POSTGRES_DB: shopops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shopops -d shopops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://shopops:shopops_local_dev@localhost:5432/shopops_test
      APP_URL: http://localhost:3100
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 14
